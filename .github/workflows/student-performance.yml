name: Student Performance Analysis v2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-performance:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Display Python version
      run: python --version
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Student Performance Analysis
      run: |
        echo "Current directory:"
        pwd
        echo "Files before running:"
        ls -la
        python app.py
        echo "Files after running:"
        ls -la
        echo "Checking if report.html exists:"
        if [ -f report.html ]; then
          echo "✓ report.html found!"
          ls -lh report.html
        else
          echo "✗ report.html NOT found!"
          exit 1
        fi
      env:
        MARKS_FILE: student_marks.json
        OUTPUT_FILE: report.html
        
    - name: Upload HTML Report as Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: student-performance-report
        path: |
          report.html
        retention-days: 30
        if-no-files-found: error
        
    - name: Display Report Summary
      if: success()
      run: |
        echo "================================"
        echo "✓ Student Performance Analysis Complete!"
        echo "✓ Report generated successfully"
        echo "✓ Download the HTML report from the Artifacts section below"
        echo "================================"

